<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Orbital signal map</title>
  <desc id="desc">Animated abstract orbital signal map with nodes, rings, and neon data paths.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="72%">
      <stop offset="0" stop-color="#132447" />
      <stop offset="0.45" stop-color="#080f1f" />
      <stop offset="1" stop-color="#030712" />
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee" />
      <stop offset="0.5" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#22c55e" />
    </linearGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="microGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#94a3b8" stroke-width="0.45" opacity="0.16" />
    </pattern>
    <style>
      .mono { font-family: "JetBrains Mono", "Fira Code", Consolas, monospace; }
      .orbit { transform-origin: 600px 260px; animation: spin 18s linear infinite; }
      .orbit2 { transform-origin: 600px 260px; animation: spinReverse 26s linear infinite; }
      .orbit3 { transform-origin: 600px 260px; animation: spin 34s linear infinite; }
      .dash { stroke-dasharray: 12 18; animation: dash 9s linear infinite; }
      .pulse { animation: pulse 2.2s ease-in-out infinite; }
      .pulse2 { animation: pulse 3.2s ease-in-out infinite; }
      .scan { animation: scan 6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes spinReverse { to { transform: rotate(-360deg); } }
      @keyframes dash { to { stroke-dashoffset: -360; } }
      @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
      @keyframes scan { 0% { transform: translateX(-420px); opacity: 0; } 18%, 82% { opacity: .55; } 100% { transform: translateX(1220px); opacity: 0; } }
    </style>
  </defs>

  <rect width="1200" height="520" rx="22" fill="#030712" />
  <rect x="16" y="16" width="1168" height="488" rx="20" fill="url(#bg)" stroke="#1e293b" />
  <rect x="16" y="16" width="1168" height="488" rx="20" fill="url(#microGrid)" opacity="0.65" />

  <g opacity="0.45" filter="url(#softGlow)">
    <circle cx="250" cy="120" r="180" fill="#0ea5e9" opacity="0.2" />
    <circle cx="960" cy="388" r="210" fill="#22c55e" opacity="0.14" />
    <circle cx="620" cy="250" r="260" fill="#7c3aed" opacity="0.16" />
  </g>

  <g filter="url(#softGlow)" fill="none">
    <ellipse cx="600" cy="260" rx="410" ry="132" stroke="url(#line)" stroke-width="2" opacity="0.8" />
    <ellipse class="dash" cx="600" cy="260" rx="322" ry="218" stroke="#38bdf8" stroke-width="1.8" opacity="0.56" transform="rotate(-16 600 260)" />
    <ellipse class="dash" cx="600" cy="260" rx="465" ry="82" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" transform="rotate(23 600 260)" />
    <circle cx="600" cy="260" r="96" stroke="#22c55e" stroke-width="2" opacity="0.68" />
    <circle cx="600" cy="260" r="154" stroke="#334155" stroke-width="1" opacity="0.9" />
    <circle cx="600" cy="260" r="230" stroke="#334155" stroke-width="1" opacity="0.65" />
  </g>

  <g class="orbit" filter="url(#softGlow)">
    <circle cx="1010" cy="260" r="7" fill="#22d3ee" />
    <circle cx="190" cy="260" r="5" fill="#22c55e" opacity="0.9" />
  </g>
  <g class="orbit2" filter="url(#softGlow)">
    <circle cx="600" cy="42" r="6" fill="#a78bfa" />
    <circle cx="600" cy="478" r="4" fill="#38bdf8" opacity="0.9" />
  </g>
  <g class="orbit3" filter="url(#softGlow)">
    <circle cx="920" cy="178" r="6" fill="#22c55e" />
    <circle cx="280" cy="342" r="5" fill="#38bdf8" opacity="0.9" />
  </g>

  <g filter="url(#softGlow)">
    <path d="M220 390 C360 280 440 360 536 254 S752 130 894 250 980 372 1080 326" fill="none" stroke="url(#line)" stroke-width="3" opacity="0.88" />
    <path d="M146 164 C300 98 420 196 528 250 S750 388 1045 122" fill="none" stroke="#22d3ee" stroke-width="1.8" opacity="0.42" />
  </g>

  <g class="mono">
    <text x="58" y="72" fill="#e2e8f0" font-size="20" letter-spacing="5">SIGNAL MAP</text>
    <text x="58" y="104" fill="#38bdf8" font-size="13" letter-spacing="4">NO PROFILE. JUST TELEMETRY.</text>
    <text x="952" y="72" fill="#c4b5fd" font-size="15" letter-spacing="4">STATUS: ONLINE</text>
    <text x="950" y="104" fill="#86efac" font-size="15" letter-spacing="4">NOISE: LOW</text>
  </g>

  <g class="mono" font-size="13" letter-spacing="3">
    <rect x="58" y="414" width="162" height="34" rx="8" fill="#071827" stroke="#155e75" />
    <text x="76" y="436" fill="#67e8f9">PYTHON NODE</text>
    <rect x="240" y="414" width="168" height="34" rx="8" fill="#101329" stroke="#4c1d95" />
    <text x="258" y="436" fill="#c4b5fd">TYPESCRIPT</text>
    <rect x="428" y="414" width="148" height="34" rx="8" fill="#061a12" stroke="#166534" />
    <text x="446" y="436" fill="#86efac">OPENWRT</text>
    <rect x="596" y="414" width="140" height="34" rx="8" fill="#111827" stroke="#334155" />
    <text x="614" y="436" fill="#cbd5e1">SHELL</text>
  </g>

  <rect class="scan" x="0" y="16" width="210" height="488" fill="#38bdf8" opacity="0.08" />
  <rect x="16" y="16" width="1168" height="488" rx="20" fill="none" stroke="url(#line)" stroke-width="2" opacity="0.7" />
</svg>
