<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="190" viewBox="0 0 1200 190" role="img" aria-labelledby="title desc">
  <title id="title">Activity stream</title>
  <desc id="desc">Animated dark neon activity stream with signal lines and soft pulse markers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050b16" />
      <stop offset="0.48" stop-color="#0b1026" />
      <stop offset="1" stop-color="#031711" />
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" />
      <stop offset="0.5" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#22c55e" />
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0" />
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.55" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0" />
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#64748b" stroke-width="0.45" opacity="0.22" />
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .mono { font-family: "JetBrains Mono", "Fira Code", Consolas, monospace; }
      .dash { stroke-dasharray: 16 14; animation: dash 6s linear infinite; }
      .scan { animation: scan 5s linear infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .pulse2 { animation: pulse 2.8s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -240; } }
      @keyframes scan { 0% { transform: translateX(-360px); opacity: 0; } 18%, 82% { opacity: 1; } 100% { transform: translateX(1240px); opacity: 0; } }
      @keyframes pulse { 0%,100% { opacity: .35; r: 4; } 50% { opacity: 1; r: 7; } }
    </style>
  </defs>

  <rect width="1200" height="190" rx="18" fill="#030712" />
  <rect x="14" y="14" width="1172" height="162" rx="16" fill="url(#bg)" stroke="#1e293b" />
  <rect x="14" y="14" width="1172" height="162" rx="16" fill="url(#grid)" opacity="0.72" />

  <g opacity="0.55">
    <rect x="58" y="50" width="1084" height="1" fill="#334155" />
    <rect x="58" y="95" width="1084" height="1" fill="#334155" />
    <rect x="58" y="140" width="1084" height="1" fill="#334155" />
  </g>

  <rect class="scan" x="0" y="14" width="280" height="162" fill="url(#fade)" />

  <g filter="url(#glow)" fill="none">
    <path class="dash" d="M64 124 C170 62 252 132 344 84 S520 42 628 96 778 148 884 92 1038 44 1134 84" stroke="url(#trace)" stroke-width="3" opacity="0.92" />
    <path d="M64 102 C188 142 264 58 390 104 S610 154 760 78 938 78 1136 128" stroke="#22d3ee" stroke-width="1.7" opacity="0.38" />
  </g>

  <g filter="url(#glow)">
    <circle class="pulse" cx="178" cy="66" r="5" fill="#22d3ee" />
    <circle class="pulse2" cx="372" cy="79" r="5" fill="#8b5cf6" />
    <circle class="pulse" cx="628" cy="96" r="5" fill="#22c55e" />
    <circle class="pulse2" cx="884" cy="92" r="5" fill="#38bdf8" />
    <circle class="pulse" cx="1088" cy="72" r="5" fill="#86efac" />
  </g>

  <g class="mono">
    <text x="58" y="38" fill="#94a3b8" font-size="13" letter-spacing="4">ACTIVITY STREAM</text>
    <text x="936" y="38" fill="#38bdf8" font-size="13" letter-spacing="4">SIGNAL LOCKED</text>
    <text x="58" y="165" fill="#64748b" font-size="12" letter-spacing="3">TRACE / BUILD / ROUTE / AUTOMATE</text>
  </g>

  <rect x="14" y="14" width="1172" height="162" rx="16" fill="none" stroke="url(#trace)" stroke-width="1.5" opacity="0.72" />
</svg>
